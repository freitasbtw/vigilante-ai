# Albumentations pipeline config — applied during dataset preparation.
# Keep additive (extra augmentations stack with YOLO's built-in mosaic/mixup).

perspective:
  scale: [0.05, 0.15]
  p: 0.5

random_brightness_contrast:
  brightness_limit: 0.3
  contrast_limit: 0.3
  p: 0.5

random_shadow:
  shadow_roi: [0, 0.5, 1, 1]
  num_shadows_lower: 1
  num_shadows_upper: 3
  p: 0.3

motion_blur:
  blur_limit: 7
  p: 0.2

defocus:
  radius: [3, 7]
  p: 0.15

downscale:
  scale_min: 0.25
  scale_max: 0.5
  p: 0.3

coarse_dropout:
  max_holes: 8
  max_height: 32
  max_width: 32
  fill_value: 0
  p: 0.3
